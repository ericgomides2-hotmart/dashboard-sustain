name: Atualizar Dados JIRA

on:
  schedule:
    - cron: '0 8 * * 1-5'  # 8h UTC (5h BRT) dias úteis
  workflow_dispatch:        # botão manual

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Extrair dados do JIRA
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python extract-jira-data.py

      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet || git commit -m "chore: atualizar dados $(date +%Y-%m-%d)"
          git push
